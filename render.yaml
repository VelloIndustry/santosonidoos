databases:
  - name: santosonidoos-db
    plan: free
    databaseName: santosonidoos
    user: santosonidoos

services:
  - type: web
    runtime: node
    name: santosonidoos
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: santosonidoos-db
          property: connectionString
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BOT_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEQUI_NUMBER
        sync: false
      - key: BANCOLOMBIA_ACCOUNT
        sync: false
      - key: STUDIO_NAME
        value: Santo Sonido OS
      - key: BUDGET_SECRET
        sync: false
      - key: BASE_URL
        sync: false
